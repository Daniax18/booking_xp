# ðŸ”„ CI/CD Pipeline â€” Booking XP (GitHub Actions)
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# ðŸ“š Explication PÃ©dagogique :
# Ce pipeline automatise :
# 1. LINT : vÃ©rification du style de code (flake8, mypy)
# 2. TEST : exÃ©cution des tests unitaires (pytest)
# 3. BUILD : construction des images Docker
# 4. DEPLOY : dÃ©ploiement (staging/production)
#
# ðŸ”‘ StratÃ©gie de dÃ©ploiement sans interruption :
# - Blue/Green : deux environnements identiques
# - On dÃ©ploie sur le "vert" pendant que le "bleu" sert le trafic
# - Une fois validÃ©, on bascule le trafic vers le "vert"
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# EmpÃªcher les exÃ©cutions simultanÃ©es sur la mÃªme branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/booking-xp

jobs:
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # ðŸ” JOB 1 : Lint â€” QualitÃ© du code
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  lint:
    name: ðŸ” Lint & Code Quality
    runs-on: ubuntu-latest
    # Ne pas bloquer le pipeline si un service non implÃ©mentÃ© Ã©choue
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        service: [log-service, auth-service, booking-service, payment-service, inventory-service]

    steps:
      - name: ðŸ“¥ Checkout code
        uses: actions/checkout@v4

      - name: ðŸ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ðŸ“¦ Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
          if [ -f api/${{ matrix.service }}/requirements.txt ]; then
            pip install -r api/${{ matrix.service }}/requirements.txt
          fi

      - name: ðŸ” Flake8 â€” Style check
        run: |
          cd api/${{ matrix.service }}
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # âœ… JOB 2 : Test â€” Tests unitaires
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  test:
    name: âœ… Tests â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    if: always()  # ExÃ©cuter mÃªme si le lint a des warnings
    strategy:
      matrix:
        service: [log-service, booking-service]  # Booking-service est maintenant couvert par des tests

    steps:
      - name: ðŸ“¥ Checkout code
        uses: actions/checkout@v4

      - name: ðŸ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ðŸ“¦ Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/${{ matrix.service }}/requirements.txt

      - name: âœ… Run tests with coverage
        run: |
          cd api/${{ matrix.service }}
          python -m pytest tests/ -v --cov=domain --cov=adapters --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          LOG_LEVEL: DEBUG

      - name: ðŸ“Š Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: api/${{ matrix.service }}/coverage.xml

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # ðŸ³ JOB 3 : Build â€” Images Docker
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  build:
    name: ðŸ³ Build â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && always()
    # Build uniquement le log-service pour l'instant
    continue-on-error: true
    strategy:
      matrix:
        service: [log-service, auth-service, booking-service, payment-service, inventory-service]

    permissions:
      contents: read
      packages: write

    steps:
      - name: ðŸ“¥ Checkout code
        uses: actions/checkout@v4

      - name: ðŸ³ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ðŸ” Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ðŸ·ï¸ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: ðŸ³ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # ðŸš€ JOB 4 : Deploy â€” DÃ©ploiement
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  deploy-staging:
    name: ðŸš€ Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: ðŸ“¥ Checkout code
        uses: actions/checkout@v4

      - name: ðŸš€ Deploy to staging
        run: |
          echo "ðŸš€ Deploying to staging environment..."
          echo "ðŸ“‹ Services: log-service, auth-service, booking-service, payment-service, inventory-service"
          # En production, on utiliserait docker-compose up -d ou kubectl apply
          # docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

  deploy-production:
    name: ðŸš€ Deploy Production (Blue/Green)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: ðŸ“¥ Checkout code
        uses: actions/checkout@v4

      - name: ðŸ”µðŸŸ¢ Blue/Green Deployment
        run: |
          echo "ðŸ”µðŸŸ¢ Blue/Green deployment strategy:"
          echo "1. Deploy new version to GREEN environment"
          echo "2. Run health checks on GREEN"
          echo "3. Switch traffic from BLUE to GREEN"
          echo "4. Keep BLUE as rollback target"
          # StratÃ©gie de dÃ©ploiement sans interruption
          # En production : docker compose, Kubernetes, ou AWS ECS

