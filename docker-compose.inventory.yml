version: '3.8'

services:
  # Inventory Service Standalone (pour le développement)
  inventory-service:
    build:
      context: ./api/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service-dev
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=inventory-service
      - SERVICE_PORT=8002
      - DATABASE_URL=postgresql+asyncpg://inventory_user:inventory_password@postgres:5432/inventory_db
      - LOG_LEVEL=INFO
      - DEBUG=false
    volumes:
      - ./api/inventory-service:/app
      - inventory-db-volume:/app/data
    networks:
      - booking-network
    restart: unless-stopped
    command: python main.py

volumes:
  inventory-db-volume:

networks:
  booking-network:
    driver: bridge
