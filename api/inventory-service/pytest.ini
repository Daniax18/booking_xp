[pytest]
# Configuration générale
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Support async
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Markers
markers =
    unit: tests unitaires
    integration: tests d'intégration
    slow: tests lents
    api: tests d'API

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
